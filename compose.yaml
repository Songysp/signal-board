services:
  postgres:
    image: postgres:16-alpine
    container_name: signalboard-postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: budongsan_allimi
    ports:
      - "5432:5432"
    volumes:
      - signalboard-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d budongsan_allimi"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  signalboard-postgres-data:
