services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-signalboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-signalboard}
    volumes:
      - signalboard-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-signalboard} -d ${POSTGRES_DB:-signalboard}"]
      interval: 10s
      timeout: 5s
      retries: 12

  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-signalboard}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-signalboard}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    command: ["python", "-m", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]

  worker:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-signalboard}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-signalboard}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "-m", "app.cli", "poll-loop"]

volumes:
  signalboard-postgres-data:
